server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache for a year.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # API and Django admin go to the backend container.
    location ~ ^/(api|admin|static)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # SPA fallback: every other route serves the React app.
    location / {
        add_header Cache-Control "no-cache";

        # Content-Security-Policy (EF-03): caps the blast radius of any XSS. With
        # script-src locked to 'self', an injected inline handler such as
        # <img onerror=...> — the receipt/invoice print vector (EF-02) — cannot
        # execute, and the same-origin print window inherits this policy. Google
        # Fonts is the only external origin the bundle needs; styles keep
        # 'unsafe-inline' because React writes element style attributes.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;

        try_files $uri /index.html;
    }
}
