name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: everfresh
          POSTGRES_USER: everfresh
          POSTGRES_PASSWORD: everfresh
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
    env:
      DB_NAME: everfresh
      DB_USER: everfresh
      DB_PASSWORD: everfresh
      DB_HOST: localhost
      DB_PORT: '5432'
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-only-not-a-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements/dev.txt
      - run: python manage.py makemigrations --check --dry-run
      - run: python -m pytest -n auto -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
