version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-everfresh}
      POSTGRES_USER: ${DB_USER:-everfresh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-everfresh}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
